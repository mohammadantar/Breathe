    body {
      font-family: 'Outfit', sans-serif;
      /* Soft, organic gradient transitioning from misty sky blue to subtle pale coral/peach */
      background: linear-gradient(135deg, #d8e5ee 0%, #e8f0f6 40%, #fef4f1 80%, #fce7e0 100%);
      background-size: 200% 200%;
      animation: gradientBG 25s ease infinite;
      color: #1e293b;
      overflow-x: hidden;
      margin: 0;
      position: relative;
    }

    @keyframes gradientBG {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    /* Bokeh and Soft Diffused Lighting */
    body::before,
    body::after {
      content: '';
      position: fixed;
      width: 70vw;
      height: 70vw;
      border-radius: 50%;
      z-index: -1;
      filter: blur(100px);
      animation: drift 40s ease-in-out infinite alternate;
      pointer-events: none;
    }

    body::before {
      background: radial-gradient(circle, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0) 70%);
      top: -20vw;
      left: -20vw;
    }

    body::after {
      background: radial-gradient(circle, rgba(253, 235, 228, 0.7) 0%, rgba(253, 235, 228, 0) 70%);
      bottom: -30vw;
      right: -20vw;
      animation: drift2 50s ease-in-out infinite alternate;
    }

    @keyframes drift {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(15vw, 10vw);
      }
    }

    @keyframes drift2 {
      0% {
        transform: translate(0, 0);
      }

      100% {
        transform: translate(-15vw, -10vw);
      }
    }

    .font-serif-logo {
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.01em;
    }

    /* Dark Mode Variables */
    html.dark body {
      background: linear-gradient(135deg, #020617 0%, #0f172a 40%, #1e1b4b 80%, #312e81 100%);
      color: #f8fafc;
    }

    html.dark .glass {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      box-shadow:
        -15px -15px 40px rgba(0, 0, 0, 0.4),
        15px 15px 40px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    html.dark .glass:hover {
      background: rgba(15, 23, 42, 0.8);
      box-shadow:
        -20px -20px 50px rgba(0, 0, 0, 0.5),
        20px 20px 50px rgba(0, 0, 0, 0.7),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    /* Premium Glassmorphism Cards */
    .glass {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 2rem;
      box-shadow:
        -15px -15px 40px rgba(255, 255, 255, 0.8),
        15px 15px 40px rgba(30, 41, 59, 0.05),
        inset 0 1px 0 rgba(255, 255, 255, 1);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .glass:hover {
      box-shadow:
        -20px -20px 50px rgba(255, 255, 255, 0.9),
        20px 20px 50px rgba(30, 41, 59, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 1);
      background: rgba(255, 255, 255, 0.5);
    }

    .glass-dark {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border-radius: 2rem;
    }

    /* Text Gradient */
    .text-gradient {
      background: linear-gradient(135deg, #475569 0%, #0f172a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Glowing Icons & Effects */
    .glow-blue {
      filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.4));
    }

    .glow-purple {
      filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.4));
    }

    .glow-red {
      filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.5));
    }

    .glow-orange {
      filter: drop-shadow(0 0 12px rgba(249, 115, 22, 0.4));
    }

    @keyframes breathing {
      0% {
        transform: scale(1.0);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1.0);
      }
    }

    .breathing-effect {
      animation: breathing 4s ease-in-out infinite;
    }

    /* Panic Help Red Pulse */
    @keyframes pulse-red-glow {
      0% {
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.3), 0 12px 40px -10px rgba(239, 68, 68, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.9);
      }

    }

    .panic-card {

      border: 1px solid rgba(239, 68, 68, 0.3);
      background: rgba(254, 242, 242, 0.6);
    }

    .panic-card:hover {
      background: rgba(254, 242, 242, 0.8);
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    /* Subtle Micro-animations */
    @keyframes float {
      0% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-12px);
      }

      100% {
        transform: translateY(0px);
      }
    }

    .floating-cloud {
      animation: float 6s ease-in-out infinite;
      filter: drop-shadow(0 15px 25px rgba(100, 149, 237, 0.2));
    }

    input:focus,
    textarea:focus {
      box-shadow: 0 0 0 4px rgba(147, 197, 253, 0.25);
      border-color: #93c5fd;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    }

      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.5);
    }

    // --- 4. The Floating Chat Interface (AI Agent) ---

          const negWords = ['sad', 'anxious', 'panic', 'stress', 'overwhelm', 'heavy', 'cry', 'depress', 'alone', 'scared', 'worried'];

        return 5;

          const scoreContext = `\nCurrent session wellbeing score: ${sentimentScore}/10. Calibrate your tone to this.`;
          const languageContext = lang === 'ar'
            ? '\nCRITICAL: Respond EXCLUSIVELY in Arabic. Do NOT mix languages.'
            : '\nRespond in English only.';

          const conversationHistory = newMessages.map(m => ({
            role: m.sender === 'user' ? 'user' : 'model',
            parts: [{ text: m.text }]
          }));

          // Call our backend /api/chat instead of Gemini directly
          const callServer = async (attempt = 1) => {
            const timeout = new Promise((_, rej) =>
              setTimeout(() => rej(new Error('TIMEOUT')), 12000)
            );
            try {
              const res = await Promise.race([
                fetch('/api/chat', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    history: conversationHistory,
                    journalContext,
                    scoreContext,
                    languageContext
                  })
                }),
                timeout
              ]);
              if (!res.ok) {
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || `Server error ${res.status}`);
              }
              return res.json();
            } catch (err) {
              console.warn(`[Bree] Attempt ${attempt} failed — ${err?.message}`);
              if (attempt < 2 && err.message !== 'TIMEOUT') {
                await new Promise(r => setTimeout(r, 1500));
                return callServer(2);
              }
              throw err;
            }
          };

          const data = await callServer();
          const result = { text: data.text };

          let rawText = data.text || "I'm here to listen.";

          // Extract sentiment_score from JSON block if present
          let aiScore = null;
          const scoreRegex = new RegExp('\\{\\s*"sentiment_score"\\s*:\\s*(\\d+)\\s*\\}');
          const jsonMatch = rawText.match(scoreRegex);
          if (jsonMatch) {
            aiScore = Math.min(10, Math.max(1, parseInt(jsonMatch[1], 10)));
            rawText = rawText.replace(scoreRegex, '').trim();
          }

          // Fallback to keyword analysis
          if (!aiScore) aiScore = analyzeSentiment(userMsg);

          // Update score and session average
          const newHistory = [...scoreHistory, aiScore];
          const avg = Math.round(newHistory.reduce((a, b) => a + b, 0) / newHistory.length);
          setSentimentScore(aiScore);
          setScoreHistory(newHistory);
          setSessionAvg(avg);
          logScore(user?.id, aiScore, !!user?.therapist);

          // Safety: strip any remaining JSON blobs from visible text
          let safeText = (rawText || "I'm here to listen.")
            .replace(/\{[\s\S]*?"sentiment_score"[\s\S]*?\}/g, '')
            .trim() || "I'm here to listen.";

          // De-duplication: if identical to the last Bree message, append a variation nudge
          const lastBreeMsg = [...newMessages].reverse().find(m => m.sender === 'bree');
          if (lastBreeMsg && lastBreeMsg.text.trim() === safeText.trim()) {
            console.warn('[Bree] Duplicate response detected — appending variation.');
            safeText += lang === 'ar' ? ' أخبرني أكثر.' : ' Tell me more about that.';
          }

          setMessages(prev => [...prev, { id: Date.now() + 1, sender: 'bree', text: safeText }]);
        } catch (error) {
          console.group('%c[Bree] API Error', 'color:#ef4444;font-weight:bold');
          console.error('Message :', error?.message);
          console.error('HTTP Code:', error?.status ?? error?.httpErrorCode ?? error?.code ?? 'unknown');
          console.error('Full obj :', error);
          console.groupEnd();
          let friendlyMsg = "I'm having a little trouble right now, but I'm still here for you. 💫";
          if (error.message === 'TIMEOUT') {
            friendlyMsg = "I took a little too long to breathe just now. Could you send that again? 🍃";
          } else if (error.message && (error.message.includes('429') || error.message.includes('quota') || error.message.includes('Quota'))) {
            friendlyMsg = "I'm a little overwhelmed right now and need a short rest (API quota reached). Please try again in a minute, or ask your developer to update the API key. ✨";
          } else if (error.message && error.message.includes('Missing API Key')) {
            friendlyMsg = "It seems my connection isn’t set up yet. Please add a Gemini API key to the .env file to activate me! 🔑";
          } else if (error.message && error.message.includes('404')) {
            friendlyMsg = "I couldn’t find the right path to think. The AI model may have changed — please let your developer know. 💭";
          }
          setMessages(prev => [...prev, {
            id: Date.now() + 1,
            sender: 'bree',
            text: friendlyMsg
          }]);
        } finally {
          setIsTyping(false);
        }

      };

      const logout = () => {
        // Clear session so the next person has to log in again
        localStorage.removeItem('breathe_user');
        sessionStorage.removeItem('breathe_user');
        setUser(null);
        setView('auth');
      };

      if (isInitializing) return null;

      return (
        <div dir={lang === 'ar' ? 'rtl' : 'ltr'} style={{ fontFamily: lang === 'ar' ? 'Cairo, sans-serif' : 'Outfit, sans-serif' }} className="min-h-screen">
          <button
            onClick={toggleLanguage}
            className="fixed top-4 end-4 z-50 glass px-4 py-2 rounded-full text-xs font-bold text-[#1e293b] dark:text-slate-100 shadow-sm hover:bg-white/40 dark:bg-slate-800/40 transition"
          >
            {lang === 'en' ? 'عربي' : 'EN'}
          </button>
          <AnimatePresence mode="wait">
            {view === 'auth' ? (
              <Auth key="auth" onLogin={handleAuth} />
            ) : view === 'onboarding' ? (
              <Onboarding key="onboarding" tempUser={user} onComplete={(u) => { setUser(u); setView('dashboard'); }} />
            ) : view === 'dashboard' ? (
              <Dashboard key="dashboard" user={user} setView={setView} onLogout={logout} isDark={isDark} toggleTheme={() => setIsDark(!isDark)} />
            ) : view === 'chat' ? (
              <ChatInterface key="chat" onBack={() => setView('dashboard')} user={user} onSupport={() => setView('support')} lang={lang} />
            ) : view === 'panic' ? (
              <PanicHelp key="panic" onBack={() => setView('dashboard')} user={user} onSupport={() => setView('support')} onPanicComplete={(score) => { const u = { ...user, panicScore: score }; setUser(u); localStorage.setItem('breathe_user', JSON.stringify(u)); setView('dashboard'); }} />
            ) : view === 'mood' ? (
              <MoodTracker key="mood" onBack={() => setView('dashboard')} onSupport={() => setView('support')} />
            ) : view === 'journal' ? (
              <Journal key="journal" onBack={() => setView('dashboard')} user={user} setUser={setUser} onSupport={() => setView('support')} />
            ) : view === 'support' ? (
              <SupportPage key="support" onBack={() => setView('dashboard')} />
            ) : null}
          </AnimatePresence>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
