                return itemDate <= c.val;

      const positiveWords = ["better", "okay", "calm", "happy", "good", "peaceful", "thanks", "relaxed"];
      let negCount = 0; let posCount = 0;
      negativeWords.forEach(w => { if (lower.includes(w)) negCount++; });
      positiveWords.forEach(w => { if (lower.includes(w)) posCount++; });
      if (negCount > posCount) { score = Math.max(1, 5 - negCount * 2); }

                <p className="mt-3 text-sm font-medium" style={{ color: checkinScore <= 3 ? '#ef4444' : checkinScore <= 6 ? '#f97316' : '#22c55e' }}>
                  {checkinScore <= 3 ? "I hear you — it's still heavy. Bree will follow up with you." : checkinScore <= 6 ? "You're getting there. That's real progress." : "You're doing well. That took real courage. 💚"}
                </p>
              </div>
              <button onClick={handleFinish} className="w-full py-3 rounded-2xl bg-green-600 hover:bg-green-700 text-white font-semibold transition shadow-md mt-2">
                Share this with Bree & Finish ✓
              </button>
            </div>
          )
        }
      ];

      const phaseNames = ['Mental Grounding', 'Mental Grounding', 'Mental Grounding', 'Active Breathing', 'Active Breathing', 'Active Breathing', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', '5-4-3-2-1', 'Physical Reset', 'Physical Reset', 'Physical Reset', 'Check-in'];
      const phaseColors = { 'Mental Grounding': '#dc2626', 'Active Breathing': '#2563eb', '5-4-3-2-1': '#7c3aed', 'Physical Reset': '#b45309', 'Check-in': '#16a34a' };

      return (
        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen p-4 md:p-6 flex flex-col max-w-3xl mx-auto">
          {/* Header */}
          <div className="flex justify-between items-center mb-4">
            <button onClick={onBack} className="text-[#2B3A55] dark:text-slate-200 hover:text-black flex items-center gap-2">
              <ArrowLeft size={20} /> Back
            </button>
            <h1 className="font-serif-logo text-2xl text-[#2B3A55] dark:text-slate-200">Panic Help</h1>
            <button onClick={onSupport} className="text-sm font-medium text-gray-500 dark:text-slate-400">[Support]</button>
          </div>

          {/* Progress Bar */}
          <div className="mb-4">
            <div className="flex justify-between text-xs text-gray-500 dark:text-slate-400 mb-1">
              <span style={{ color: phaseColors[phaseNames[step]] }} className="font-semibold">{phaseNames[step]}</span>
              <span>Step {step + 1} of {cards.length}</span>
            </div>
            <div className="w-full bg-gray-200 dark:bg-slate-700 rounded-full h-2">
              <div className="h-2 rounded-full transition-all duration-500" style={{ width: ((step + 1) / cards.length * 100) + '%', background: phaseColors[phaseNames[step]] }}></div>
            </div>
          </div>

          {/* Card */}
          <div className="flex-1 flex flex-col items-center justify-center w-full">
            <div className="w-full relative min-h-[420px] flex items-center justify-center">
              <AnimatePresence mode="wait">
                <motion.div
                  key={step}
                  initial={{ opacity: 0, x: 30 }}
                  animate={{ opacity: 1, x: 0 }}
                  exit={{ opacity: 0, x: -30 }}
                  transition={{ duration: 0.35, ease: "easeInOut" }}
                  className="absolute inset-0 rounded-[32px] p-8 flex items-center justify-center overflow-y-auto"
                  style={{ background: cards[step].bg, boxShadow: '0 20px 60px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.9)', border: '1px solid rgba(255,255,255,0.7)' }}
                >
                  <div className="w-full">{cards[step].content}</div>
                </motion.div>
              </AnimatePresence>
            </div>

            {/* Nav Buttons */}
            <div className="flex gap-4 mt-6">
              {step > 0 && <button onClick={goPrev} className="px-8 py-2.5 rounded-full glass hover:bg-white/60 dark:hover:bg-slate-700/60 transition text-[#2B3A55] dark:text-white font-medium">← Previous</button>}
              {step < cards.length - 1 && <button onClick={goNext} className="px-8 py-2.5 rounded-full text-white font-medium transition shadow-md" style={{ background: phaseColors[phaseNames[step]] }}>Next Step →</button>}
            </div>
          </div>

          {/* Fixed Emergency Footer */}
          <div className="text-center mt-6 pt-4 border-t border-gray-200/50 flex flex-col items-center gap-1">
            <a href={'tel:' + (user?.emergency || '')} className="text-red-500 hover:text-red-700 font-bold tracking-widest text-sm uppercase animate-pulse">[ EMERGENCY CONTACT ]</a>
            <a href="mailto:breath.tma@gmail.com" className="text-xs text-gray-500 dark:text-slate-400 hover:underline">Official Support: breath.tma@gmail.com</a>
          </div>
        </motion.div>
      );
    };


    // --- 4. The Floating Chat Interface (AI Agent) ---
    const ChatInterface = ({ onBack, user, onSupport, lang }) => {
      const { t } = useTranslation();
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      // Sentiment state
      const journalBaseScore = (() => {
        if (user?.journalMemory) {
          // Rough heuristic: negative keywords in journal analysis lower the baseline
          const mem = user.journalMemory.toLowerCase();
          const negWords = ['sad', 'anxious', 'panic', 'stress', 'overwhelm', 'heavy', 'cry', 'depress', 'alone', 'scared', 'worried'];
          const hits = negWords.filter(w => mem.includes(w)).length;
          return Math.max(3, 5 - hits);
        }
        return 5;
      })();
      const [sentimentScore, setSentimentScore] = useState(journalBaseScore);
      const [scoreHistory, setScoreHistory] = useState([journalBaseScore]);
      const [sessionAvg, setSessionAvg] = useState(journalBaseScore);
      const endRef = useRef(null);

      useEffect(() => {
        const memory = getRandomMemory();
        const initialGreeting = `Hi ${user?.name?.split(' ')[0] || ''},`;

        setMessages([
          { id: 1, sender: 'bree', text: initialGreeting }
        ]);
      }, []);

      useEffect(() => {
        endRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      // Typing Indicator Sync
      useEffect(() => {
        if (!db_fs || !user?.id) return;
        const updateTypingStatus = async (status) => {
          try {
            await fs_setDoc(fs_doc(db_fs, "users", user.id), { isTyping: status }, { merge: true });
          } catch (e) { /* ignore */ }
        };

        if (input.trim().length > 0) {
          updateTypingStatus(true);
          const timer = setTimeout(() => updateTypingStatus(false), 3000);
          return () => clearTimeout(timer);
        } else {
          updateTypingStatus(false);
        }
      }, [input, user?.id]);

      const handleSend = async () => {
        const cleanedInput = input.replace(/[.,/#!$%^&*;:{}=\-_`~()]/g, "").trim();
        if (!cleanedInput) {
          alert('Please type a message');
          return;
        }

        const userMsg = input.trim();
        const newMsg = { id: Date.now(), sender: 'user', text: userMsg, timestamp: new Date() };
        const newMessages = [...messages, newMsg];
        setMessages(newMessages);
        setInput('');
        setIsTyping(true);

        // Save to Firestore
        if (db_fs && user?.id) {
          try {
            await fs_addDoc(fs_collection(db_fs, "users_chats"), {
              userId: user.id,
              text: userMsg,
              sender: 'user',
              timestamp: serverTimestamp()
            });
          } catch (e) { console.error("Error saving chat to FS:", e); }
        }

        // Score is now computed after AI response

        try {
          const journalContext = user?.journalMemory
            ? `\nUser's recent journal insight: "${user.journalMemory}". Reference it warmly if relevant — never force it.`
            : '';
          const scoreContext = `\nCurrent session wellbeing score: ${sentimentScore}/10. Calibrate your tone to this.`;
          const languageContext = lang === 'ar'
            ? '\nCRITICAL: You are an empathetic mental health assistant. Respond exclusively in warm, professional Arabic. Use cultural nuances appropriate for the Middle East. Do NOT mix languages.'
            : '\nYou are an empathetic mental health assistant. Respond exclusively in English.';

          const conversationHistory = newMessages.map(m => ({
            role: m.sender === 'user' ? 'user' : 'model',
            parts: [{ text: m.text }]
          }));

          const callGemini = async (attempt = 1) => {
            const apiKey = getClientGeminiKey();
            if (!apiKey) throw new Error('Missing API Key');

            const fullSystemInstruction = BREE_CHAT_BASE_SYSTEM_INSTRUCTION + BREE_CHAT_RULES_SUFFIX +
              languageContext + scoreContext + journalContext;
            const genAI = new GoogleGenerativeAI(apiKey);
            const model = genAI.getGenerativeModel({
              model: 'gemini-2.5-flash',
              systemInstruction: fullSystemInstruction
            });

            const timeout = new Promise((_, rej) =>
              setTimeout(() => rej(new Error('TIMEOUT')), 12000)
            );
            try {
              const result = await Promise.race([
                model.generateContent({ contents: conversationHistory }),
                timeout
              ]);
              return { text: result.response.text() };
            } catch (err) {
              console.warn(`[Bree] Attempt ${attempt} failed — ${err?.message}`);
              if (attempt < 2 && err.message !== 'TIMEOUT') {
                await new Promise(r => setTimeout(r, 1500));
                return callGemini(2);
              }
              throw err;
            }
          };

          const data = await callGemini();

          let rawText = data.text || "I'm here to listen.";

          // Extract sentiment_score from JSON block if present
          let aiScore = null;
          const scoreRegex = new RegExp('\\{\\s*"sentiment_score"\\s*:\\s*(\\d+)\\s*\\}');
          const jsonMatch = rawText.match(scoreRegex);
          if (jsonMatch) {
            aiScore = Math.min(10, Math.max(1, parseInt(jsonMatch[1], 10)));
            rawText = rawText.replace(scoreRegex, '').trim();
          }

          // Fallback to keyword analysis
          if (!aiScore) aiScore = analyzeSentiment(userMsg);

          // Update score and session average
          const newHistory = [...scoreHistory, aiScore];
          const avg = Math.round(newHistory.reduce((a, b) => a + b, 0) / newHistory.length);
          setSentimentScore(aiScore);
          setScoreHistory(newHistory);
          setSessionAvg(avg);
          logScore(user?.id, aiScore, !!user?.therapist);

          // Safety: strip any remaining JSON blobs from visible text
          let safeText = (rawText || "I'm here to listen.")
            .replace(/\{[\s\S]*?"sentiment_score"[\s\S]*?\}/g, '')
            .trim() || "I'm here to listen.";

          // De-duplication: if identical to the last Bree message, append a variation nudge
          const lastBreeMsg = [...newMessages].reverse().find(m => m.sender === 'bree');
          if (lastBreeMsg && lastBreeMsg.text.trim() === safeText.trim()) {
            console.warn('[Bree] Duplicate response detected — appending variation.');
            safeText += lang === 'ar' ? ' أخبرني أكثر.' : ' Tell me more about that.';
          }

          const breeMsg = { id: Date.now() + 1, sender: 'bree', text: safeText, timestamp: new Date() };
          setMessages(prev => [...prev, breeMsg]);

          // Save to Firestore
          if (db_fs && user?.id) {
            try {
              await fs_addDoc(fs_collection(db_fs, "users_chats"), {
                userId: user.id,
                text: safeText,
                sender: 'bree',
                timestamp: serverTimestamp()
              });
            } catch (e) { console.error("Error saving Bree chat to FS:", e); }
          }
        } catch (error) {
          console.group('%c[Bree] API Error', 'color:#ef4444;font-weight:bold');
          console.error('Message :', error?.message);
          console.error('HTTP Code:', error?.status ?? error?.httpErrorCode ?? error?.code ?? 'unknown');
          console.error('Full obj :', error);
          console.groupEnd();
          let friendlyMsg = "I'm having a little trouble right now, but I'm still here for you. 💫";
          if (error.message === 'TIMEOUT') {
            friendlyMsg = "I took a little too long to breathe just now. Could you send that again? 🍃";
          } else if (error.message && (error.message.includes('429') || error.message.includes('quota') || error.message.includes('Quota'))) {
            friendlyMsg = "I'm a little overwhelmed right now and need a short rest (API quota reached). Please try again in a minute, or ask your developer to update the API key. ✨";
          } else if (error.message && error.message.includes('Missing API Key')) {
            friendlyMsg = "It seems my connection isn’t set up yet. Please add a Gemini API key to the .env file to activate me! 🔑";
          } else if (error.message && error.message.includes('404')) {
            friendlyMsg = "I couldn’t find the right path to think. The AI model may have changed — please let your developer know. 💭";
          }
          setMessages(prev => [...prev, {
            id: Date.now() + 1,
            sender: 'bree',
            text: friendlyMsg
          }]);
        } finally {
          setIsTyping(false);
        }
      };

      // Listen for Doctor Feedback
      useEffect(() => {
        if (!db_fs || !user?.id) return;
        const q = fs_query(
          fs_collection(db_fs, "doctor_feedback"),
          fs_where("userId", "==", user.id),
          fs_orderBy("timestamp", "asc")
        );
        const unsubscribe = fs_onSnapshot(q, (snapshot) => {
          snapshot.docChanges().forEach((change) => {
            if (change.type === "added") {
              const data = change.doc.data();
              // Check if message already exists in local state to avoid duplicates
              setMessages(prev => {
                if (prev.find(m => m.id === change.doc.id)) return prev;
                return [...prev, {
                  id: change.doc.id,
                  sender: 'doctor',
                  text: data.text,
                  timestamp: data.timestamp?.toDate ? data.timestamp.toDate() : (data.timestamp || new Date())
                }];
              });
            }
          });
        });
        return () => unsubscribe();
      }, [user?.id]);

      return (
        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="h-screen flex flex-col p-4 md:p-8 max-w-6xl mx-auto">
          <div className="flex justify-between items-center mb-6">
            <button onClick={onBack} className="text-[#2B3A55] dark:text-slate-200 hover:text-black flex items-center gap-2">
              <ArrowLeft size={20} /> {t('chat.back')}
            </button>
            <h1 className="font-serif-logo text-4xl text-[#2B3A55] dark:text-slate-200">{t('chat.title')}</h1>
            <button onClick={onSupport} className="text-sm font-medium text-gray-500 dark:text-slate-400">{t('chat.support')}</button>
          </div>

          <div className="flex-1 flex gap-6 min-h-0 pb-4">
            <div className="hidden lg:flex w-1/4 glass-dark rounded-3xl p-6 flex-col text-white/90">
              <div className="flex items-center gap-3 mb-8">
                {user?.photoURL ? (
                  <img src={user.photoURL} alt="Profile" className="w-10 h-10 rounded-full shadow-sm" />
                ) : (
                  <div className="w-10 h-10 bg-blue-400/20 rounded-full flex items-center justify-center">👤</div>
                )}
                <h3 className="font-medium text-lg">{t('chat.sidebar_title')}</h3>
              </div>
              <div className="space-y-4 text-sm opacity-80">
                <p className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-300"></div> {t('chat.sidebar_1')}</p>
                <p className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-300"></div> {t('chat.sidebar_2')}</p>
                <p className="flex items-center gap-2"><div className="w-2 h-2 rounded-full bg-blue-300"></div> {t('chat.sidebar_3')}</p>
              </div>
              <div className="mt-auto p-4 bg-white/10 rounded-xl border border-white/10">
                <p className="text-xs text-blue-200 mb-2 flex items-center gap-1"><Info size={12} /> {t('chat.metric')}</p>
                <div className="w-full bg-black/20 rounded-full h-3 mb-2 overflow-hidden">
                  <div
                    style={{
                      width: `${sentimentScore * 10}%`,
                      transition: 'width 0.8s cubic-bezier(0.4, 0, 0.2, 1)',
                      background: sentimentScore <= 3
                        ? 'linear-gradient(to right, #ef4444, #f97316)'
                        : sentimentScore <= 6
                          ? 'linear-gradient(to right, #f97316, #eab308)'
                          : 'linear-gradient(to right, #22c55e, #10b981)'
                    }}
                    className="h-3 rounded-full"
                  ></div>
                </div>
                <div className="flex justify-between text-[10px] text-white/50">
                  <span>{sentimentScore <= 3 ? '😔 Distressed' : sentimentScore <= 6 ? '😐 Neutral' : '😊 Calm'}</span>
                  <span dir="ltr">{sessionAvg}/10 avg</span>
                </div>
                <p className="text-[10px] text-end text-white/40 mt-1" dir="ltr">Now: {sentimentScore}/10</p>
              </div>
            </div>

            <motion.div className="flex-1 glass rounded-3xl shadow-xl flex flex-col relative overflow-hidden" animate={{ y: [0, -8, 0] }} transition={{ repeat: Infinity, duration: 6, ease: "easeInOut" }}>
              <div className="p-4 border-b border-white/20 flex items-center gap-3 bg-white/30 backdrop-blur-md">
                <BreeIcon size={40} />
                <div>
                  <h3 className="font-medium text-[#2B3A55] dark:text-slate-200">{t('chat.mindful')}</h3>
                  <p className="text-xs text-gray-500 dark:text-slate-400">{t('chat.listening')}</p>
                </div>
              </div>

              <div className="flex-1 overflow-y-auto p-6 space-y-6">
                {messages.map((msg) => (
                  <motion.div key={msg.id} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className={`flex gap-3 ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                    {msg.sender === 'bree' && <BreeIcon size={32} className="mt-auto" />}
                    {msg.sender === 'doctor' && <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white text-[10px] mt-auto shadow-lg">DR</div>}
                    <div className={`p-4 rounded-[24px] max-w-[80%] ${msg.sender === 'user'
                        ? 'bg-gradient-to-tr from-[#0f172a] to-[#1e293b] text-white rounded-br-sm shadow-md'
                        : msg.sender === 'doctor'
                          ? 'bg-blue-600 text-white rounded-bl-sm shadow-lg border-2 border-white/20'
                          : 'glass bg-white/60 text-[#0f172a] dark:text-white shadow-sm rounded-bl-sm border border-white/50'
                      }`}>
                      {msg.sender === 'doctor' && <p className="text-[10px] font-bold mb-1 opacity-70 uppercase tracking-tighter">Doctor's Feedback</p>}
                      <p className="leading-relaxed text-[15px]" dir="auto">{msg.text}</p>
                    </div>
                  </motion.div>
                ))}
                {isTyping && (
                  <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="flex gap-3 justify-start">
                    <BreeIcon size={32} className="mt-auto" />
                    <div className="p-4 rounded-2xl bg-white/80 rounded-es-none flex gap-1 items-center">
                      <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                      <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div>
                      <div className="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></div>
                    </div>
                  </motion.div>
                )}
                <div ref={endRef} />
              </div>

              <div className="p-4 bg-white/30 backdrop-blur-xl border-t border-white/30">
                <div className="flex gap-3 items-center bg-white/50 dark:bg-slate-800/50 p-2 rounded-full border border-white/60 shadow-inner">
                  <input
                    type="text"
                    value={input}
                    onChange={e => setInput(e.target.value)}
                    onKeyDown={e => e.key === 'Enter' && handleSend()}
                    placeholder={t('chat.placeholder')}
                    className="flex-1 px-4 py-2 bg-transparent focus:outline-none text-[#0f172a] dark:text-white placeholder-gray-500"
                  />
                  <button onClick={handleSend} disabled={!input.trim()} className="w-12 h-12 rounded-full bg-[#0f172a] text-white flex items-center justify-center hover:bg-[#1e293b] transition-all disabled:opacity-50 disabled:hover:scale-100 shadow-md transform hover:scale-105">
                    <Send size={18} className="ml-1" />
                  </button>
                </div>
                <p className="text-center mt-3 text-xs text-gray-500 dark:text-slate-400 font-medium">
                  {t('chat.privacy', { linked: user?.therapist ? t('chat.linked_yes') : t('chat.linked_no') })}
                </p>
              </div>
            </motion.div>
          </div>
        </motion.div>
      );
    };

    // --- 5. Mood Tracker ---
    const MoodTracker = ({ onBack, onSupport }) => {
      const { t } = useTranslation();
      const days = ['sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
      const [grid, setGrid] = useState(Array(35).fill('none'));
      const [selectedColor, setSelectedColor] = useState('good');

      useEffect(() => {
        const saved = localStorage.getItem('breathe_mood_grid');
        if (saved) setGrid(JSON.parse(saved));
      }, []);

      const colorMap = { sad: 'bg-[#1D60A4]', panic: 'bg-[#B21F1F]', anxious: 'bg-[#E3983B]', stressed: 'bg-[#EBD15A]', good: 'bg-[#1E9540]', none: 'bg-white/40 dark:bg-slate-800/40' };

      const handleSquareClick = (index) => {
        const newGrid = [...grid];
        newGrid[index] = selectedColor;
        setGrid(newGrid);
        localStorage.setItem('breathe_mood_grid', JSON.stringify(newGrid));
      };

      return (
        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="min-h-screen p-6 flex flex-col max-w-4xl mx-auto">
          <div className="flex justify-between items-center mb-8">
            <button onClick={onBack} className="text-[#2B3A55] dark:text-slate-200 hover:text-black flex items-center gap-2">
              <ArrowLeft size={20} /> {t('mood.back')}
            </button>
            <h1 className="font-serif-logo text-4xl text-[#2B3A55] dark:text-slate-200">{t('mood.title')}</h1>
            <button onClick={onSupport} className="text-sm font-medium text-gray-500 dark:text-slate-400">{t('mood.support')}</button>
          </div>

          <div className="flex-1 flex flex-col items-center justify-center w-full relative">
            <p className="text-[#1e293b] dark:text-slate-100 mb-4 font-medium italic">Select a color below, then click a box to log today's mood</p>
            <div className="bg-[#fdfaf0] shadow-xl rounded-[40px] p-12 border border-yellow-100 w-full max-w-3xl">
              <div className="grid grid-cols-7 gap-4 text-center mb-6 text-[#1e293b] dark:text-slate-100 font-serif-logo text-xl">
                {days.map((d, i) => <div key={i}>{d}</div>)}
              </div>
              <div className="grid grid-cols-7 gap-4">
                {grid.map((status, i) => (
                  <div
                    key={i}
                    onClick={() => handleSquareClick(i)}
                    className={`aspect-square rounded-xl ${colorMap[status]} cursor-pointer transition hover:scale-105 shadow-sm border border-black/5`}
                  ></div>
                ))}
              </div>

              <div className="flex flex-wrap justify-center gap-8 mt-12 text-sm text-[#2B3A55] dark:text-slate-200 font-medium">
                <div onClick={() => setSelectedColor('sad')} className={`cursor-pointer flex items-center gap-2 ${selectedColor === 'sad' ? 'scale-110 font-bold border-b-2 border-black' : 'opacity-70'}`}><div className={`w-6 h-6 rounded-md ${colorMap.sad}`}></div> {t('mood.sad')}</div>
                <div onClick={() => setSelectedColor('panic')} className={`cursor-pointer flex items-center gap-2 ${selectedColor === 'panic' ? 'scale-110 font-bold border-b-2 border-black' : 'opacity-70'}`}><div className={`w-6 h-6 rounded-md ${colorMap.panic}`}></div> {t('mood.panic')}</div>
                <div onClick={() => setSelectedColor('anxious')} className={`cursor-pointer flex items-center gap-2 ${selectedColor === 'anxious' ? 'scale-110 font-bold border-b-2 border-black' : 'opacity-70'}`}><div className={`w-6 h-6 rounded-md ${colorMap.anxious}`}></div> {t('mood.anxious')}</div>
                <div onClick={() => setSelectedColor('good')} className={`cursor-pointer flex items-center gap-2 ${selectedColor === 'good' ? 'scale-110 font-bold border-b-2 border-black' : 'opacity-70'}`}><div className={`w-6 h-6 rounded-md ${colorMap.good}`}></div> {t('mood.good')}</div>
              </div>

      const handleAnalyze = async () => {

                    const twoDaysAgo = new Date(); twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
                    
                    let dateLabel = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
                    if (date.toDateString() === yesterday.toDateString()) dateLabel = "Yesterday";
                    else if (date.toDateString() === twoDaysAgo.toDateString()) dateLabel = "2 days ago";

      // Trend Analysis: Check for mood decline in last 3 journals
      const hasMoodDecline = useMemo(() => {
        if (!patientJournals || patientJournals.length < 3) return false;
        const recent = patientJournals.slice(0, 3);
        const negativeWords = ['sad', 'heavy', 'panic', 'pain', 'hopeless', 'tired'];
        const score = recent.reduce((acc, j) => {
          if (!j || !j.text) return acc;
          const hits = negativeWords.filter(w => j.text.toLowerCase().includes(w)).length;
          return acc + hits;
        }, 0);
        return score >= 3;
      }, [patientJournals]);

      useEffect(() => {
        if (!db_fs || !selectedPatient?.id) return;
        setIsDetailLoading(true);
        const chatQ = fs_query(fs_collection(db_fs, "users_chats"), fs_where("userId", "==", selectedPatient.id), fs_orderBy("timestamp", "asc"));
        const journalQ = fs_query(fs_collection(db_fs, "users_journals"), fs_where("userId", "==", selectedPatient.id), fs_orderBy("timestamp", "desc"));
        const metricsQ = fs_query(fs_collection(db_fs, "users_metrics"), fs_where("userId", "==", selectedPatient.id), fs_orderBy("timestamp", "desc"));
        const unsubChat = fs_onSnapshot(chatQ, (snap) => setPatientChat(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
        const unsubJournal = fs_onSnapshot(journalQ, (snap) => setPatientJournals(snap.docs.map(d => ({ id: d.id, ...d.data() }))));

            setIsAnalyzingLive(false);

                        <div className="absolute right-0 bottom-0 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
                      </div>
                    )}

                    <div className="grid grid-cols-1 xl:grid-cols-3 gap-8">
                      {/* Chat Feed */}
                      <div className="xl:col-span-2 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm flex flex-col h-[550px] overflow-hidden">
                        <div className="p-6 border-b border-slate-50 bg-slate-50/50 flex justify-between items-center">
                          <div className="flex flex-col gap-1">
                            <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-widest flex items-center gap-2"><MessageCircle size={14} className="text-blue-500" /> {t('doctor.live_feed')}</h4>
                            {liveSentimentNote && (
                              <motion.p initial={{ opacity: 0, x: -10 }} animate={{ opacity: 1, x: 0 }} className="text-[11px] font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100 flex items-center gap-2">
                                <Activity size={12} className="animate-pulse" /> {t('doctor.ai_insight', { text: liveSentimentNote })}
                              </motion.p>
                            )}
                          </div>
                          <div className="flex items-center gap-3">
                            {isAnalyzingLive && <span className="text-[10px] font-black text-slate-400 animate-pulse uppercase tracking-tighter">{t('doctor.insight_loading')}</span>}
                            {patientTyping && <span className="text-[10px] font-bold text-blue-500 animate-pulse italic">{t('doctor.patient_active')}</span>}
                          </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar">
                          {patientChat.map((m, idx) => (
                            <div key={m.id || idx} className={`flex ${m.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                              <div className={`max-w-[80%] p-5 rounded-[2rem] text-sm ${m.sender === 'user' ? 'bg-slate-100 text-slate-800 rounded-tr-none' : 'bg-blue-600 text-white rounded-tl-none shadow-md'}`}>{m.text}</div>
                            </div>
                          ))}
                          {patientChat.length === 0 && <p className="text-center text-slate-300 py-10 italic">No chat history.</p>}
                        </div>
                        <div className="p-6 bg-slate-50 border-t border-slate-100 flex gap-3">
                          <input type="text" value={feedback} onChange={e => setFeedback(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendFeedback()} className="flex-1 bg-white border border-slate-200 rounded-2xl px-6 py-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm" placeholder={t('doctor.reply_placeholder')} />
                          <button onClick={sendFeedback} className="w-14 h-14 bg-blue-600 text-white rounded-2xl flex items-center justify-center hover:bg-blue-700 shadow-xl transition-all"><Send size={20} /></button>
                        </div>
                      </div>

                      {/* Emotional State Gauge */}
                      <div className="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm p-10 flex flex-col items-center justify-center text-center">
                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-10">{t('doctor.internal_state')}</h4>
                        <div className="relative w-48 h-48 flex items-center justify-center">
                          <svg className="w-full h-full transform -rotate-90" viewBox="0 0 100 100">
                            <circle cx="50" cy="50" r="44" stroke="#f1f5f9" strokeWidth="8" fill="none" />
                            <motion.circle cx="50" cy="50" r="44" stroke={(patientMetrics[0]?.score || 5) <= 3 ? '#ef4444' : '#3b82f6'} strokeWidth="8" fill="none" strokeDasharray="276.46" initial={{ strokeDashoffset: 276.46 }} animate={{ strokeDashoffset: 276.46 - (276.46 * (patientMetrics[0]?.score || 5)) / 10 }} transition={{ duration: 1.5, ease: "easeOut" }} strokeLinecap="round" />
                          </svg>
                          <div className="absolute text-center">
                            <p className="text-5xl font-black text-slate-800">{patientMetrics[0]?.score || '5'}</p>
                            <p className="text-[10px] font-black text-slate-400 uppercase">Score</p>
                          </div>
                        </div>
                        <p className={`mt-8 text-xs font-bold ${(patientMetrics[0]?.score || 5) <= 3 ? 'text-red-500' : 'text-blue-500'}`}>
                          {(patientMetrics[0]?.score || 5) <= 3 ? t('doctor.clinical_risk') : t('doctor.stable')}
                        </p>
                      </div>
                    </div>

                    {/* Journals Section (Deep Stacked) */}
                    <div className="space-y-6 pb-20">
                      <div className="flex justify-between items-center">
                        <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2"><Book size={16} className="text-blue-500" /> {t('doctor.narratives')}</h4>
                        {hasMoodDecline && <span className="bg-red-500 text-white text-[9px] font-black px-3 py-1.5 rounded-full animate-pulse shadow-lg">{t('doctor.alert')}</span>}
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {patientJournals.map(j => (
                          <div key={j.id} onClick={() => setSelectedJournal(j)} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm hover:shadow-md transition-all cursor-pointer group">
                            <div className="flex justify-between mb-4">
                              <span className="text-[9px] font-black text-blue-500 uppercase">{j.timestamp?.toDate ? j.timestamp.toDate().toLocaleDateString() : t('doctor.recent')}</span>
                              <div className={`w-3 h-3 rounded-full ${j.sentimentScore <= 3 ? 'bg-red-500' : 'bg-green-500'}`}></div>
                            </div>
                            <p className="text-slate-600 text-sm italic mb-6 leading-relaxed line-clamp-3">"{j.text}"</p>
                            <div className="pt-4 border-t border-slate-50 group-hover:border-blue-100 transition-colors">
                              <p className="text-[9px] font-black text-slate-400 uppercase mb-1">{t('doctor.clinical_note')}</p>
                              <p className="text-[11px] font-bold text-slate-700 leading-tight">{j.summary || t('doctor.in_progress')}</p>
                            </div>
                          </div>
                        ))}
                        {patientJournals.length === 0 && <p className="col-span-full text-center py-20 text-slate-300 font-medium italic">{t('doctor.no_journals')}</p>}
                      </div>
                    </div>

                    {/* Journal Detail Overlay */}
                    <AnimatePresence>
                      {selectedJournal && (
                        <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
                          <motion.div initial={{ scale: 0.9, y: 20 }} animate={{ scale: 1, y: 0 }} exit={{ scale: 0.9, y: 20 }} className="bg-white w-full max-w-5xl h-[80vh] rounded-[3rem] shadow-2xl flex overflow-hidden border border-white/20" dir={i18n.language === 'ar' ? 'rtl' : 'ltr'}>
                            {/* Sidebar History */}
                            <div className="w-80 bg-slate-50 border-r border-slate-100 flex flex-col p-8">
                              <div className="flex items-center gap-3 mb-10">
                                <Book className="text-blue-600" size={24} />
                                <h3 className="font-serif-logo text-xl text-slate-800">{t('doctor.history')}</h3>
                              </div>
                              <div className="space-y-3 overflow-y-auto custom-scrollbar flex-1">
                                {patientJournals.map(pj => {
                                  const date = pj.timestamp?.toDate ? pj.timestamp.toDate() : new Date();
                                  const isSelected = selectedJournal.id === pj.id;
                                  return (
                                    <button key={pj.id} onClick={() => setSelectedJournal(pj)} className={`w-full text-left p-4 rounded-2xl transition-all ${isSelected ? 'bg-blue-600 text-white shadow-lg' : 'bg-white border border-slate-100 hover:border-blue-200'}`}>
                                      <p className={`text-[9px] font-black uppercase mb-1 ${isSelected ? 'text-blue-100' : 'text-blue-500'}`}>{date.toLocaleDateString()}</p>
                                      <p className={`text-xs font-bold truncate ${isSelected ? 'text-white' : 'text-slate-700'}`}>{pj.summary || 'Untitled Entry'}</p>
                                    </button>
                                  );
                                })}
                              </div>
                              <button onClick={() => setSelectedJournal(null)} className="mt-6 w-full py-4 rounded-2xl bg-slate-800 text-white text-sm font-bold shadow-lg hover:bg-black transition-all">{t('doctor.close')}</button>
                            </div>

                            {/* Content Area */}
                            <div className="flex-1 flex flex-col min-w-0">
                              <div className="p-8 border-b border-slate-100 flex justify-between items-center bg-white/80 backdrop-blur-md">
                                <div>
                                  <h4 className="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">{t('doctor.detailed')}</h4>
                                  <p className="text-xl font-bold text-slate-800">{selectedJournal.timestamp?.toDate ? selectedJournal.timestamp.toDate().toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }) : 'Unknown Date'}</p>
                                </div>
                                <div className="flex items-center gap-4">
                                  <div className="bg-blue-50 px-4 py-2 rounded-xl border border-blue-100">
                                    <p className="text-[9px] font-black text-blue-400 uppercase">{t('doctor.sentiment')}</p>
                                    <p className="text-xs font-bold text-blue-600">{t('doctor.stable_analysis')}</p>
                                  </div>
                                </div>
                              </div>
                              <div className={`flex-1 overflow-y-auto p-12 bg-[#fdfaf0] relative ${i18n.language === 'ar' ? 'border-e-[4px]' : 'border-s-[4px]'} border-red-200`} style={{ backgroundImage: 'repeating-linear-gradient(transparent, transparent 39px, #e2e8f0 39px, #e2e8f0 40px)', lineHeight: '40px' }}>
                                <div className={`absolute top-0 bottom-0 ${i18n.language === 'ar' ? 'end-10' : 'start-10'} w-[1px] bg-red-200 opacity-50`}></div>
                                <p className="text-xl font-serif-logo text-slate-700 leading-[40px] relative z-10 whitespace-pre-wrap px-8">
                                  {selectedJournal.text}
                                </p>
                              </div>
                              <div className="p-8 bg-blue-600 text-white">
                                <p className="text-[10px] font-black uppercase tracking-widest opacity-60 mb-2">{t('doctor.clinical_summary')}</p>
                                <p className="text-sm font-medium italic">"{selectedJournal.summary || t('doctor.no_analysis')}"</p>
                              </div>
                            </div>
                          </motion.div>
                        </motion.div>
                      )}
                    </AnimatePresence>
                  </div>
                </div>
              ) : (
                <div className="flex-1 flex flex-col items-center justify-center text-center p-20 bg-slate-50/50">
                  <div className="w-40 h-40 bg-white rounded-full flex items-center justify-center text-7xl mb-8 shadow-xl opacity-40 grayscale animate-pulse">🏥</div>
                  <h3 className="text-3xl font-serif-logo text-slate-300 mb-4">{t('doctor.select_patient')}</h3>
                  <p className="text-slate-500 font-medium max-w-sm leading-relaxed">{t('doctor.select_desc')}</p>
                </div>
              )}
            </div>
          </div>

          {/* New Patient Toast */}
          <AnimatePresence>
            {showNewPatientToast && (
              <motion.div
                initial={{ opacity: 0, y: 50 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: 50 }}
                className="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] bg-[#1E293B] text-white px-8 py-4 rounded-2xl shadow-2xl flex items-center gap-4 border border-white/10"
              >
                <div className="w-10 h-10 bg-green-500 rounded-full flex items-center justify-center shadow-lg animate-bounce">✓</div>
                <div>
                  <p className="font-bold text-sm">{t('doctor.link_toast')}</p>
                  <p className="text-[10px] text-white/50 uppercase font-black">{t('doctor.link_desc')}</p>
                </div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    };

    // --- Main App Component ---
    const App = () => {
      const { i18n } = useTranslation();
      const [user, setUser] = useState(null);
      const [view, setView] = useState('auth');
      const [lang, setLang] = useState('en');
      const [isInitializing, setIsInitializing] = useState(true);

      useEffect(() => {
        const saved = localStorage.getItem('breathe_user') || sessionStorage.getItem('breathe_user');
        if (saved) {
          const parsed = JSON.parse(saved);
          setUser(parsed);
          setView(parsed.role === 'doctor' ? 'doctor_dashboard' : 'dashboard');
        }
        setIsInitializing(false);
      }, []);

      const toggleLanguage = () => {
        const newLang = lang === 'en' ? 'ar' : 'en';
        setLang(newLang);
        i18n.changeLanguage(newLang);
      };

      const handleAuth = (authData) => {
        const uWithLang = { ...authData, lang: i18n.language };
        if (authData.remember) {
          localStorage.setItem('breathe_user', JSON.stringify(uWithLang));
        } else {
          sessionStorage.setItem('breathe_user', JSON.stringify(uWithLang));
        }
        
        setUser(uWithLang);
        if (authData.isNew) {
          setView('onboarding');
        } else {
          setView(authData.role === 'doctor' ? 'doctor_dashboard' : 'dashboard');
        }
      };

      const logout = () => {
        // Clear session so the next person has to log in again
        localStorage.removeItem('breathe_user');
        sessionStorage.removeItem('breathe_user');
        setUser(null);
        setView('auth');
      };

      useEffect(() => {
        if (!user || isInitializing) return;
        
        const patientViews = ['dashboard', 'chat', 'panic', 'mood', 'journal'];
        const doctorViews = ['doctor_dashboard'];
        
        if (user.role === 'doctor' && patientViews.includes(view)) {
          setView('doctor_dashboard');
        } else if (user.role !== 'doctor' && doctorViews.includes(view)) {
          setView('dashboard');
        }
      }, [user, view, isInitializing]);

      if (isInitializing) return null;

      return (
        <div dir={lang === 'ar' ? 'rtl' : 'ltr'} style={{ fontFamily: lang === 'ar' ? 'Cairo, sans-serif' : 'Outfit, sans-serif' }} className="min-h-screen">
          <button
            onClick={toggleLanguage}
            className="fixed top-4 end-4 z-50 glass px-4 py-2 rounded-full text-xs font-bold text-[#1e293b] shadow-sm hover:bg-white/40 transition"
          >
            {lang === 'en' ? 'عربي' : 'EN'}
          </button>
          <AnimatePresence mode="wait">
            {view === 'auth' ? (
              <Auth key="auth" onLogin={handleAuth} />
            ) : view === 'onboarding' ? (
              <Onboarding key="onboarding" tempUser={user} onComplete={(u) => { setUser(u); setView(u.role === 'doctor' ? 'doctor_dashboard' : 'dashboard'); }} />
            ) : view === 'dashboard' ? (
              <Dashboard key="dashboard" user={user} setView={setView} onLogout={logout} />
            ) : view === 'chat' ? (
              <ChatInterface key="chat" onBack={() => setView('dashboard')} user={user} onSupport={() => setView('support')} lang={lang} />
            ) : view === 'panic' ? (
              <PanicHelp key="panic" onBack={() => setView('dashboard')} user={user} onSupport={() => setView('support')} onPanicComplete={(score) => { const u = { ...user, panicScore: score }; setUser(u); localStorage.setItem('breathe_user', JSON.stringify(u)); setView('dashboard'); }} />
            ) : view === 'mood' ? (
              <MoodTracker key="mood" onBack={() => setView('dashboard')} onSupport={() => setView('support')} />
            ) : view === 'journal' ? (
              <Journal key="journal" onBack={() => setView('dashboard')} user={user} setUser={setUser} onSupport={() => setView('support')} />
            ) : view === 'support' ? (
              <SupportPage key="support" onBack={() => setView(user?.role === 'doctor' ? 'doctor_dashboard' : 'dashboard')} />
            ) : view === 'doctor_dashboard' ? (
              <DoctorDashboard key="doctor" user={user} onLogout={logout} />
            ) : null}
          </AnimatePresence>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
