const analyzeSentiment = (text) => {
  const lower = text.toLowerCase();
  let score = 5; 
  const negativeWords = ["panic", "overwhelmed", "can't breathe", "scared", "heavy", "sad", "anxious", "stressed", "help"];
  const positiveWords = ["better", "okay", "calm", "happy", "good", "peaceful", "thanks", "relaxed"];
  let negCount = 0; let posCount = 0;
  negativeWords.forEach(w => { if (lower.includes(w)) negCount++; });
  positiveWords.forEach(w => { if (lower.includes(w)) posCount++; });
  if (negCount > posCount) { score = Math.max(1, 5 - negCount * 2); } 
  else if (posCount > negCount) { score = Math.min(10, 5 + posCount * 2); }
  return score;
}

// --- 1. Authentication & Onboarding ---
const Auth = ({ onLogin }) => {
  const { t } = useTranslation();
  const [isLogin, setIsLogin] = useState(true);
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [error, setError] = useState('');

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!email || !password) { setError(t('auth.error_empty')); return; }
    if (isLogin) {
      const savedStr = localStorage.getItem('breathe_user');
      if (savedStr) {
        const saved = JSON.parse(savedStr);
        if (saved.email === email && saved.password === password) { onLogin(saved); return; }
      }
      setError(t('auth.error_invalid'));
    } else {
      onLogin({ isNew: true, email, password });
    }
  };

  return (
    <div className="fixed inset-0 flex items-center justify-center p-4 z-50">
      <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="glass w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden">
        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-300 to-yellow-200"></div>
        <div className="flex flex-col items-center mb-6">
          <BreeIcon size={80} />
          <h2 className="font-serif-logo text-4xl text-[#1e293b] mt-4">{t('auth.welcome')}</h2>
          <p className="text-sm text-center text-gray-600 mt-2">{t('auth.subtitle')}</p>
        </div>
        {error && <p className="text-red-500 text-sm text-center mb-4 font-medium">{error}</p>}
        <form onSubmit={handleSubmit} className="space-y-4 text-start">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{t('auth.email')}</label>
            <input required type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full px-4 py-2 rounded-xl border border-gray-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-300" />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{t('auth.password')}</label>
            <input required type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full px-4 py-2 rounded-xl border border-gray-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-300" />
          </div>
          <button type="submit" className="w-full bg-[#1e293b] hover:bg-black text-white py-3 rounded-xl font-medium transition shadow-lg mt-6">
            {isLogin ? t('auth.login') : t('auth.signup')}
          </button>
        </form>
        <div className="mt-6 text-center text-sm">
          <span className="text-gray-600">{isLogin ? t('auth.no_account') : t('auth.has_account')} </span>
          <button onClick={() => { setIsLogin(!isLogin); setError(''); }} className="text-[#1e293b] font-bold hover:underline">
            {isLogin ? t('auth.signup') : t('auth.login')}
          </button>
        </div>
      </motion.div>
    </div>
  );
};

const Onboarding = ({ onComplete, tempUser }) => {
  const { t } = useTranslation();
  const [formData, setFormData] = useState({
    name: '', phone: '', emergency: '', relationship: '', therapist: ''
  });

  const handleSubmit = (e) => {
    e.preventDefault();
    if (!formData.name || !formData.phone || !formData.emergency || !formData.relationship) return;
    const user = saveUser({ ...tempUser, ...formData, id: Date.now().toString() });
    localStorage.setItem('breathe_user', JSON.stringify(user));
    onComplete(user);
  };

  return (
    <div className="fixed inset-0 flex items-center justify-center p-4 z-50">
      <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="glass w-full max-w-md p-8 rounded-3xl shadow-2xl relative overflow-hidden">
        <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-300 to-yellow-200"></div>
        <div className="flex flex-col items-center mb-6">
          <BreeIcon size={80} />
          <h2 className="font-serif-logo text-4xl text-[#1e293b] mt-4">{t('onboarding.welcome')}</h2>
          <p className="text-sm text-center text-gray-600 mt-2">{t('onboarding.setup')}</p>
        </div>
        <form onSubmit={handleSubmit} className="space-y-4 text-start">
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">{t('onboarding.name')}</label>
              <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-gray-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-300" />
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">{t('onboarding.phone')}</label>
              <input required type="tel" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-gray-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-300" dir="ltr" />

          </div>
          <div className="grid grid-cols-2 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">{t('onboarding.emergency')} <span className="text-red-400">*</span></label>

            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">{t('onboarding.relationship')} <span className="text-red-400">*</span></label>
              <input required type="text" value={formData.relationship} onChange={e => setFormData({...formData, relationship: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-gray-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-300" />
            </div>
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">{t('onboarding.therapist')}</label>
            <input type="tel" value={formData.therapist} onChange={e => setFormData({...formData, therapist: e.target.value})} className="w-full px-4 py-2 rounded-xl border border-gray-200 bg-white/50 focus:outline-none focus:ring-2 focus:ring-blue-300" />
          </div>
          <button type="submit" className="w-full bg-[#1e293b] hover:bg-black text-white py-3 rounded-xl font-medium transition shadow-lg mt-6">
            {t('onboarding.enter')}

// --- 4. The Floating Chat Interface (AI Agent) ---
const ChatInterface = ({ onBack, user }) => {
  const { t } = useTranslation();
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState('');
  const [isTyping, setIsTyping] = useState(false);
  const [sentimentScore, setSentimentScore] = useState(null);
  const endRef = useRef(null);

  useEffect(() => {
    const memory = getRandomMemory();
    const initialGreeting = `Hi ${user?.name?.split(' ')[0] || ''}, I'm here to listen. Remember when you told me about ${memory}? Hold onto that feeling. I'm here for you now. What's on your mind?`;
    
    setMessages([
      { id: 1, sender: 'bree', text: initialGreeting }
    ]);
  }, []);

  useEffect(() => {
    endRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages, isTyping]);

  const handleSend = async () => {
    const cleanedInput = input.replace(/[.,/#!$%^&*;:{}=\-_`~()]/g,"").trim();
    if (!cleanedInput) {
      alert('Please type a message');
      return;
    }

    const userMsg = input.trim();
    const newMessages = [...messages, { id: Date.now(), sender: 'user', text: userMsg }];
    setMessages(newMessages);
    setInput('');
    setIsTyping(true);

    const score = analyzeSentiment(userMsg);
    setSentimentScore(score);
    logScore(user?.id, score, !!user?.therapist);

    try {
      const apiKey = 'AIzaSyCuORqA5c6XQ0FSQti-CGNW2BomxEo-r2k';
      const genAI = new GoogleGenerativeAI(apiKey);
      const model = genAI.getGenerativeModel({ 
        model: 'gemini-1.5-flash',
        systemInstruction: "You are Bree, an empathetic AI companion. You must adapt to the user's requests naturally. If the user asks for a story, a joke, or a distraction, DO NOT ask clinical questions like 'how long have you felt this way?'. Instead, instantly provide a calming, beautifully written therapeutic story or engage in casual, friendly conversation. Flow with the user's intent. Do not act like a rigid therapist; act like an emotionally intelligent friend.\n\nDeep Conversational Immersion:\n1. Active Threading: naturally weave details from previous messages into the current response.\n2. Emotional Mirroring & Pacing: match the user's energy, use grounding language if they are anxious and typing a lot.\n3. Seamless Transitions: never change the subject abruptly. Bridge back naturally to their feelings (e.g., '...and that's how the little bird found its way home. How are you feeling in your chest right now after hearing that?').\n4. Human Imperfections: occasionally use conversational fillers like 'Hmm...', 'I hear you...', or 'Take your time...' at the beginning of sentences to simulate a real human thinking."
      });

      const conversationHistory = newMessages.map(m => ({
        role: m.sender === 'user' ? 'user' : 'model',
        parts: [{ text: m.text }]
      }));
      
      const result = await model.generateContent({ contents: conversationHistory });
      const responseText = result.response.text();
      
      setMessages(prev => [...prev, { id: Date.now()+1, sender: 'bree', text: responseText }]);
    } catch (error) {
      console.error('GEMINI API ERROR DETAILS:', error);
      setMessages(prev => [...prev, { 
        id: Date.now()+1, 
        sender: 'bree', 
        text: 'I lost my connection for a second, could you repeat that?' 
      }]);

      setIsTyping(false);
    }
  };

  return (

// --- Main App Component ---
const App = () => {
  const { i18n } = useTranslation();
  const [user, setUser] = useState(null);
  const [view, setView] = useState('auth');
  const [lang, setLang] = useState('en');
  const [isInitializing, setIsInitializing] = useState(true);

  useEffect(() => {
    const saved = localStorage.getItem('breathe_user');
    if (saved) {
      setUser(JSON.parse(saved));
      setView('dashboard');
    }
    setIsInitializing(false);
  }, []);

  const toggleLanguage = () => {
    const newLang = lang === 'en' ? 'ar' : 'en';
    setLang(newLang);
    i18n.changeLanguage(newLang);
  };

  const handleAuth = (authData) => {
    if (authData.isNew) {
      setUser(authData);
      setView('onboarding');
    } else {
      setUser(authData);
      setView('dashboard');
    }
  };

  const logout = () => {
    localStorage.removeItem('breathe_user');
    setUser(null);
    setView('auth');
  };

  if (isInitializing) return null;

  return (
    <div dir={lang === 'ar' ? 'rtl' : 'ltr'} style={{ fontFamily: lang === 'ar' ? 'Cairo, sans-serif' : 'Outfit, sans-serif' }} className="min-h-screen">
      <button 
        onClick={toggleLanguage} 
        className="fixed top-4 end-4 z-50 glass px-4 py-2 rounded-full text-xs font-bold text-[#1e293b] shadow-sm hover:bg-white/40 transition"
      >
        {lang === 'en' ? 'عربي' : 'EN'}
      </button>
      <AnimatePresence mode="wait">
        {view === 'auth' ? (
          <Auth key="auth" onLogin={handleAuth} />
        ) : view === 'onboarding' ? (
          <Onboarding key="onboarding" tempUser={user} onComplete={(u) => { setUser(u); setView('dashboard'); }} />
        ) : view === 'dashboard' ? (
          <Dashboard key="dashboard" user={user} setView={setView} onLogout={logout} />
        ) : view === 'chat' ? (
          <ChatInterface key="chat" onBack={() => setView('dashboard')} user={user} />
        ) : view === 'panic' ? (
          <PanicHelp key="panic" onBack={() => setView('dashboard')} user={user} />
        ) : view === 'mood' ? (
          <MoodTracker key="mood" onBack={() => setView('dashboard')} />
        ) : view === 'journal' ? (
          <Journal key="journal" onBack={() => setView('dashboard')} />
        ) : null}
      </AnimatePresence>
    </div>
  );
};
