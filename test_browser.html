<!DOCTYPE html>
<html>
<head>
  <script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.sh/@google/generative-ai@0.14.1"
    }
  }
  </script>
</head>
<body>
  <div id="output">Running...</div>
  <script type="module">
    import { GoogleGenerativeAI } from '@google/generative-ai';
    const apiKey = "AIzaSyB8JLS-iig4sGROWYt5T7rarzegL2IF6zk";
    const genAI = new GoogleGenerativeAI(apiKey);
    const model = genAI.getGenerativeModel({ 
      model: 'gemini-2.5-flash',
      systemInstruction: "You are Bree, an empathetic AI companion."
    }, { apiVersion: 'v1beta' });

    model.generateContent({ contents: [{role: 'user', parts: [{text: 'hi'}]}] })
      .then(result => {
        document.getElementById('output').innerText = 'SUCCESS: ' + result.response.text();
      })
      .catch(err => {
        document.getElementById('output').innerText = 'ERROR: ' + err.toString() + ' ' + err.stack;
      });
  </script>
</body>
</html>
